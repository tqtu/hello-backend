name: "CI - Build and Push to ECR"

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Select target environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - staging
          - prod

permissions:
  contents: read

env:
  AWS_REGION: "ap-southeast-1"
  # Base name of the app
  APP_NAME: "hello-backend"

jobs:
  build-and-push:
    name: "Build and Push"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set Environment Variable"
        # If triggered by push (develop branch), default to 'qa'
        # If triggered manually, use the input selection
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "TARGET_ENV=qa" >> $GITHUB_ENV
          else
            echo "TARGET_ENV=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          fi

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Login to Amazon ECR"
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: "Build, Tag, and Push"
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Construct the full namespaced path: unboundshare/qa/hello-backend
          # NOTE: You must have created this repository name in AWS first!
          REPO_PATH="unboundshare/${{ env.TARGET_ENV }}/$APP_NAME"
          FULL_URI="$ECR_REGISTRY/$REPO_PATH"

          echo "Targeting Repo: $FULL_URI"

          # 1. Build and Tag
          # Tags: 'latest', 'commit-hash', and 'environment' (qa/staging/prod)
          docker build -t $FULL_URI:latest \
                       -t $FULL_URI:$IMAGE_TAG \
                       -t $FULL_URI:${{ env.TARGET_ENV }} .
          
          # 2. Push all tags
          docker push $FULL_URI:latest
          docker push $FULL_URI:$IMAGE_TAG
          docker push $FULL_URI:${{ env.TARGET_ENV }}
          
          echo "Successfully pushed to $REPO_PATH with tags: latest, $IMAGE_TAG, ${{ env.TARGET_ENV }}"