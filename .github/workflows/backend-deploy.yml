name: "CI - Build and Push to ECR"

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Select target environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - staging
          - production # Matches your screenshot folder name

permissions:
  contents: read

env:
  AWS_REGION: "ap-southeast-1"
  # This identifies the specific service/Dockerfile
  SERVICE_NAME: "hello-backend"

jobs:
  build-and-push:
    name: "Build and Push"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set Environment Variable"
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "TARGET_ENV=qa" >> $GITHUB_ENV
          else
            echo "TARGET_ENV=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          fi

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Login to Amazon ECR"
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: "Build, Tag, and Push"
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # 1. Generate a short SHA for the tag
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          
          # 2. Construct the Repository URI (matches your screenshot structure)
          # Example: .../unboundshare/qa/hello-backend
          REPO_URI="${{ env.ECR_REGISTRY }}/unboundshare/${{ env.TARGET_ENV }}/${{ env.SERVICE_NAME }}"
          
          # 3. Create the Prefixed Tag
          # Format: hello-backend-b4f4ee0b
          PREFIXED_TAG="${{ env.SERVICE_NAME }}-$SHORT_SHA"

          echo "Pushing to: $REPO_URI"
          echo "Using Tag: $PREFIXED_TAG"

          # 4. Build with specific tags
          # We tag with 'latest' for the environment and the 'service-sha' for tracking
          docker build -t "$REPO_URI:latest" \
                       -t "$REPO_URI:$PREFIXED_TAG" \
                       -t "$REPO_URI:${{ env.TARGET_ENV }}" .
          
          # 5. Push to ECR
          docker push "$REPO_URI:latest"
          docker push "$REPO_URI:$PREFIXED_TAG"
          docker push "$REPO_URI:${{ env.TARGET_ENV }}"