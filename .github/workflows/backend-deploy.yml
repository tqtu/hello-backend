name: "CI - Build and Push to ECR"

on:
  push:
    branches:
      - develop
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: read

env:
  AWS_REGION: "ap-southeast-1"
  IMAGE_NAME: "unboundshare" # Must match your Terraform repo name

jobs:
  build-and-push:
    name: "Build and Push"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Login to Amazon ECR"
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: "Build, Tag, and Push Image to ECR"
        env:
          # This gets the registry URL automatically from the login step
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }} # Uses the commit hash as a unique version
        run: |
          # 1. Build the Docker image
          docker build -t $ECR_REGISTRY/$IMAGE_NAME:latest -t $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG .
          
          # 2. Push 'latest' (for easy pulling)
          docker push $ECR_REGISTRY/$IMAGE_NAME:latest
          
          # 3. Push unique tag (for version history/rollback)
          docker push $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          
          echo "Successfully pushed $IMAGE_NAME to $ECR_REGISTRY"