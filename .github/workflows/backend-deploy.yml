name: "CI - Build and Push to ECR"

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: "ap-southeast-1"
  # This creates the "sub-folder" structure in ECR
  # Ensure a repo with this EXACT name exists in your AWS Console
  REPOSITORY_PATH: "unboundshare/hello-backend"

jobs:
  build-and-push:
    name: "Build and Push"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Login to Amazon ECR"
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: "Build, Tag, and Push"
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Use the full commit hash as requested
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # The full URI will look like: 
          # 975050065947.dkr.ecr.ap-southeast-1.amazonaws.com/unboundshare/hello-backend
          FULL_REPO_NAME=$ECR_REGISTRY/$REPOSITORY_PATH
          
          echo "Building image for $FULL_REPO_NAME"

          # 1. Build and tag with BOTH 'latest' and the 'commit-hash'
          docker build -t $FULL_REPO_NAME:latest -t $FULL_REPO_NAME:$IMAGE_TAG .
          
          # 2. Push both tags
          docker push $FULL_REPO_NAME:latest
          docker push $FULL_REPO_NAME:$IMAGE_TAG
          
          echo "Pushed tags: latest, $IMAGE_TAG"