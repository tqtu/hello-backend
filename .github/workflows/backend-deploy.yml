name: "Backend Deploy - EC2 via Docker"

on:
  # Auto deploy to QA when merged into develop
  push:
    branches:
      - develop

  # Manual trigger for production
  workflow_dispatch:
    inputs:
      environment:
        description: "Select target environment"
        required: true
        default: "production"
        type: choice
        options:
          - qa
          - production

permissions:
  contents: read

env:
  AWS_REGION: "ap-southeast-1"
  IMAGE_NAME: "hellobackend"  # Docker image name

jobs:
  # =========================
  # STAGE 1: BUILD DOCKER IMAGE
  # =========================
  build:
    name: "1. Build Docker Image"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v2

      - name: "Login to AWS ECR"
        uses: aws-actions/amazon-ecr-login@v1
        with:
          region: ${{ env.AWS_REGION }}

      - name: "Build Docker Image"
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: "Tag Docker Image for ECR"
        run: |
          REPO_URI=${{ secrets.AWS_ECR_URI }}/${{ env.IMAGE_NAME }}
          docker tag ${{ env.IMAGE_NAME }}:latest $REPO_URI:latest

      - name: "Push Docker Image to ECR"
        run: |
          REPO_URI=${{ secrets.AWS_ECR_URI }}/${{ env.IMAGE_NAME }}
          docker push $REPO_URI:latest

      - name: "Upload Image URI"
        uses: actions/upload-artifact@v4
        with:
          name: image-uri
          path: image_uri.txt
        run: |
          echo "${{ secrets.AWS_ECR_URI }}/${{ env.IMAGE_NAME }}:latest" > image_uri.txt

  # =========================
  # STAGE 2: DEPLOY TO EC2
  # =========================
  deploy:
    name: "2. Deploy to EC2"
    needs: build
    runs-on: ubuntu-latest

    if: |
      github.ref == 'refs/heads/develop' ||
      github.event_name == 'workflow_dispatch'

    environment: ${{ github.event.inputs.environment || 'qa' }}

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Download Image URI"
        uses: actions/download-artifact@v4
        with:
          name: image-uri
          path: .

      - name: "Deploy via SSH"
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Load Docker image URI
            IMAGE_URI=$(cat image_uri.txt)

            # Login to ECR on EC2
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_URI }}

            # Pull latest Docker image
            docker pull $IMAGE_URI

            # Stop old container if running
            if [ $(docker ps -q -f name=hellobackend) ]; then
              docker stop hellobackend
              docker rm hellobackend
            fi

            # Run new container
            docker run -d --name hellobackend -p 8080:8080 $IMAGE_URI